<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XNOR Cloud - Apple</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <span class="app-title">XNOR Cloud</span>
    <div class="search-container">
      <i class="fas fa-search search-icon"></i>
      <input type="text" id="search-input" placeholder="Search item...">
    </div>
    <button id="menu-btn" aria-label="Open Menu"><i class="fas fa-ellipsis-v"></i></button>
  </header>

  <main id="item-list">
    <div id="loading-items" style="text-align:center;padding:40px;color:var(--secondary);">
      <i class="fas fa-spinner fa-spin" style="font-size:24px;"></i> Loading Apple items...
    </div>
    <div id="dynamic-items"></div>

    <div id="menu-overlay" class="menu-overlay">
      <div class="menu-content">
        <button id="close-menu"><i class="fas fa-times"></i></button>
        <h2>Settings</h2>
        <div class="theme-switch-container">
          <span>Dark/Light Theme:</span>
          <label class="switch">
            <input type="checkbox" id="theme-switch">
            <span class="slider round"></span>
          </label>
        </div>
        <hr><br>
        <h3>Account</h3>
        <div class="platform-buttons">
          <a href="login.html" class="platform-btn"><i class="fas fa-sign-in-alt"></i> Login</a>
          <a href="account.html" class="platform-btn"><i class="fas fa-user"></i> My Account</a>
          <a href="favorites.html" class="platform-btn"><i class="fas fa-heart"></i> Favorites</a>
        </div>
        <hr><br>
        <h3>Download for:</h3>
        <div class="platform-buttons">
          <a href="android.html" class="platform-btn"><i class="fab fa-android"></i> Android</a>
          <a href="apple.html" class="platform-btn active"><i class="fab fa-apple"></i> Apple</a>
          <a href="windows.html" class="platform-btn"><i class="fab fa-windows"></i> Windows</a>
          <a href="mac.html" class="platform-btn"><i class="fab fa-apple"></i> Mac</a>
        </div>
        <hr><br>
        <h3>About</h3>
        <div class="platform-buttons">
          <a href="about.html" class="platform-btn"><i class="fas fa-info-circle"></i> About Us</a>
          <a href="other/fix.html" class="platform-btn"><i class="fas fa-tools"></i> Fix Issues</a>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-btn"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="android.html" class="nav-btn"><i class="fab fa-android"></i><span>Android</span></a>
    <a href="windows.html" class="nav-btn"><i class="fab fa-windows"></i><span>Windows</span></a>
    <a href="other/news.html" class="nav-btn"><i class="fas fa-newspaper"></i><span>News</span></a>
  </nav>

  <script src="main.js"></script>
  <script>
    const PLATFORM = 'Apple';
    // identical loadItems()
    async function loadItems() {
      const container = document.getElementById('dynamic-items');
      const loading = document.getElementById('loading-items');

      try {
        const result = await XNOR.apiGet('getPlatformItems', { platform: PLATFORM });
        if (!result.success || !result.items || result.items.length === 0) {
          loading.innerHTML = '<p>No items found. Add items to the Apple sheet.</p>';
          return;
        }
        loading.style.display = 'none';
        const items = result.items;

        const categories = {};
        items.forEach((item, index) => {
          const cat = item.category || 'Uncategorized';
          if (!categories[cat]) categories[cat] = [];
          categories[cat].push({ ...item, serial: index + 1 });
        });

        let html = '';
        let globalSerial = 1;
        for (const [category, catItems] of Object.entries(categories)) {
          html += `
          <div class="content-section">
            <h3 class="section-title"><i class="fab fa-apple"></i> ${category}</h3>
            <div class="section-divider"></div>`;

          catItems.forEach(item => {
            html += `
            <div class="card" data-search="${item.searchTags||''} ${item.name||''} ${item.description||''} ${item.size||''} ${item.website||''}">
              <button class="fav-btn" data-item-id="${item.itemId}" data-item-name="${item.name}">
                <i class="far fa-heart"></i>
              </button>
              <div class="app-header">
                <a href="${item.openUrl||'#'}" target="_blank" class="thumb-link">
                  <img src="${item.iconUrl||'https://via.placeholder.com/64'}" alt="${item.name}" class="app-icon" onerror="this.src='https://via.placeholder.com/64/333/aaa?text=App'">
                </a>
                <div class="app-info">
                  <h3>#${globalSerial} ${item.name||'Unknown'}</h3>
                  <div class="app-details">
                    <span class="detail-item website">${item.website||'N/A'}</span>
                    <span class="detail-item size">${item.size||'N/A'}</span>
                  </div>
                </div>
              </div>
              <p class="app-description">${item.description||''}</p>
              <div class="actions">
                <a href="${item.openUrl||'#'}" class="action-btn open-btn" target="_blank"><i class="fas fa-external-link-alt"></i>Open</a>
                <a href="${item.downloadUrl||'#'}" class="action-btn download-btn"><i class="fas fa-download"></i>Download</a>
              </div>
            </div>`;
            globalSerial++;
          });
          html += `</div>`;
        }
        container.innerHTML = html;

        document.querySelectorAll('.download-btn').forEach(btn => {
          btn.addEventListener('click', function(e) {
            if (!XNOR.isLoggedIn()) {
              e.preventDefault();
              alert('Please login to download.');
              window.location.href = 'login.html';
            }
          });
        });

        XNOR.initFavoriteButtons();
        XNOR.initSearch();
        loadFavoriteStates();
      } catch (e) {
        console.error(e);
        loading.innerHTML = '<p>Error loading items. Please try again.</p>';
      }
    }

    async function loadFavoriteStates() {
      const user = XNOR.getSessionUser();
      if (!user) return;
      const result = await XNOR.apiGet('getFavorites', { sessionId: user.sessionId });
      if (result.success && result.favorites) {
        const favIds = result.favorites.map(f => f.itemId);
        document.querySelectorAll('.fav-btn').forEach(btn => {
          if (favIds.includes(btn.dataset.itemId)) {
            btn.classList.add('active');
            btn.querySelector('i').className = 'fas fa-heart';
          }
        });
      }
    }

    document.addEventListener('DOMContentLoaded', loadItems);
  </script>
</body>
</html>
